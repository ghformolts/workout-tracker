<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Log</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1a1a1a;
            --text: #e5e5e5;
            --text-muted: #666;
            --accent: #22c55e;
            --accent-dim: #166534;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }
        
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--surface);
            margin-bottom: 20px;
        }
        
        .header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
        .header .date { color: var(--text-muted); font-size: 14px; }
        
        /* Stats Row */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--surface);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        
        /* Quick Log */
        .quick-log {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .quick-log h2 {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        
        .exercise-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .exercise-btn {
            background: var(--surface-hover);
            border: 1px solid transparent;
            color: var(--text);
            padding: 16px 8px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        
        .exercise-btn:hover {
            border-color: var(--accent);
            background: var(--bg);
        }
        
        .exercise-btn .icon { font-size: 20px; }
        
        /* Log Form */
        .log-form {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--surface-hover);
        }
        
        .log-form.active { display: block; }
        
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .input-group {
            flex: 1;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-group input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--surface-hover);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        
        .btn-primary:hover { opacity: 0.9; }
        
        /* Today's Workouts */
        .section-title {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-title button {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 13px;
            cursor: pointer;
        }
        
        .workout-list {
            margin-bottom: 24px;
        }
        
        .workout-item {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.2s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .workout-info h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .workout-meta {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .workout-meta .pr-badge {
            color: var(--warning);
            font-weight: 600;
            margin-left: 8px;
        }
        
        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        
        .delete-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        /* Insights */
        .insights {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .insights h2 {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        
        .streak-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }
        
        .streak-day {
            flex: 1;
            height: 40px;
            background: var(--surface-hover);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .streak-day.active {
            background: var(--accent);
            color: #000;
        }
        
        .streak-day.today {
            border: 2px solid var(--accent);
        }
        
        .volume-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 80px;
            padding-top: 20px;
        }
        
        .volume-bar {
            flex: 1;
            background: var(--accent-dim);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            position: relative;
            transition: all 0.3s;
        }
        
        .volume-bar:hover {
            background: var(--accent);
        }
        
        .volume-bar::after {
            content: attr(data-day);
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--text-muted);
        }
        
        /* Data Actions */
        .data-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn-secondary {
            flex: 1;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--surface-hover);
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .btn-secondary:hover {
            border-color: var(--text-muted);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }
        
        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }
        
        .modal-content textarea {
            width: 100%;
            height: 150px;
            background: var(--bg);
            border: 1px solid var(--surface-hover);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            resize: none;
            margin-bottom: 16px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
        }
        
        .modal-actions button {
            flex: 1;
        }
        
        .hidden-input { display: none; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Log</h1>
                <div class="date" id="currentDate"></div>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="streakCount">0</div>
                <div class="stat-label">Day Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="weekVolume">0</div>
                <div class="stat-label">This Week</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalWorkouts">0</div>
                <div class="stat-label">Total</div>
            </div>
        </div>
        
        <div class="quick-log">
            <h2>Quick Log</h2>
            <div class="exercise-grid">
                <button class="exercise-btn" onclick="showLogForm('Push-up')">
                    <span class="icon">💪</span>
                    Push-up
                </button>
                <button class="exercise-btn" onclick="showLogForm('Pull-up')">
                    <span class="icon">🎯</span>
                    Pull-up
                </button>
                <button class="exercise-btn" onclick="showLogForm('Squat')">
                    <span class="icon">🦵</span>
                    Squat
                </button>
                <button class="exercise-btn" onclick="showLogForm('Deadlift')">
                    <span class="icon">🏋️</span>
                    Deadlift
                </button>
                <button class="exercise-btn" onclick="showLogForm('Bench')">
                    <span class="icon">🛏️</span>
                    Bench
                </button>
                <button class="exercise-btn" onclick="showLogForm('Press')">
                    <span class="icon">⬆️</span>
                    Press
                </button>
                <button class="exercise-btn" onclick="showLogForm('Row')">
                    <span class="icon">🚣</span>
                    Row
                </button>
                <button class="exercise-btn" onclick="showLogForm('Run')">
                    <span class="icon">🏃</span>
                    Run
                </button>
            </div>
            
            <div class="log-form" id="logForm">
                <div class="form-row">
                    <div class="input-group">
                        <label>Exercise</label>
                        <input type="text" id="exerciseName" readonly>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Weight (kg)</label>
                        <input type="number" id="weight" placeholder="0" step="0.5">
                    </div>
                    <div class="input-group">
                        <label>Reps</label>
                        <input type="number" id="reps" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>Sets</label>
                        <input type="number" id="sets" placeholder="1" value="1">
                    </div>
                </div>
                <button class="btn-primary" onclick="logWorkout()">Log It</button>
            </div>
        </div>
        
        <div class="section-title">
            <span>Today</span>
            <button onclick="clearToday()">Clear</button>
        </div>
        <div class="workout-list" id="todayList">
            <div class="empty-state">Nothing logged yet</div>
        </div>
        
        <div class="insights">
            <h2>Last 7 Days</h2>
            <div class="streak-bar" id="streakBar"></div>
            <div class="volume-chart" id="volumeChart"></div>
        </div>
        
        <div class="data-actions">
            <button class="btn-secondary" onclick="exportData()">Export</button>
            <button class="btn-secondary" onclick="showImportModal()">Import</button>
            <button class="btn-secondary" onclick="showHistory()">History</button>
        </div>
    </div>
    
    <div class="modal" id="importModal">
        <div class="modal-content">
            <h3>Import Data</h3>
            <textarea id="importData" placeholder="Paste your JSON data here..."></textarea>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="importData()">Import</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="historyModal">
        <div class="modal-content">
            <h3>All Workouts</h3>
            <div id="historyList" style="max-height: 300px; overflow-y: auto; margin-bottom: 16px;"></div>
            <button class="btn-secondary" onclick="closeModal()" style="width: 100%;">Close</button>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <input type="file" class="hidden-input" id="fileInput" accept=".json" onchange="handleFileImport(event)">

    <script>
        // Data storage
        const STORAGE_KEY = 'workout_log_v1';
        
        function getData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : { workouts: [], prs: {} };
        }
        
        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        // Date helpers
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }
        
        function getDateDaysAgo(days) {
            const d = new Date();
            d.setDate(d.getDate() - days);
            return d.toISOString().split('T')[0];
        }
        
        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        // UI helpers
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function showLogForm(exercise) {
            const form = document.getElementById('logForm');
            const nameInput = document.getElementById('exerciseName');
            nameInput.value = exercise;
            form.classList.add('active');
            
            // Auto-focus weight for speed
            setTimeout(() => document.getElementById('weight').focus(), 50);
        }
        
        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }
        
        // Core functions
        function logWorkout() {
            const exercise = document.getElementById('exerciseName').value;
            const weight = parseFloat(document.getElementById('weight').value) || 0;
            const reps = parseInt(document.getElementById('reps').value) || 0;
            const sets = parseInt(document.getElementById('sets').value) || 1;
            
            if (!reps && !weight) {
                showToast('Enter weight or reps');
                return;
            }
            
            const data = getData();
            const today = getToday();
            
            // Check for PR
            const key = `${exercise}_${weight}kg`;
            const prevPR = data.prs[key] || 0;
            const isPR = reps > prevPR;
            if (isPR) data.prs[key] = reps;
            
            // Add workout
            data.workouts.push({
                id: Date.now(),
                date: today,
                exercise,
                weight,
                reps,
                sets,
                volume: weight * reps * sets,
                isPR
            });
            
            saveData(data);
            
            // Reset form
            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
            document.getElementById('sets').value = '1';
            document.getElementById('logForm').classList.remove('active');
            
            showToast(isPR ? 'PR! 🔥' : 'Logged');
            render();
        }
        
        function deleteWorkout(id) {
            const data = getData();
            data.workouts = data.workouts.filter(w => w.id !== id);
            saveData(data);
            render();
            showToast('Deleted');
        }
        
        function clearToday() {
            const data = getData();
            const today = getToday();
            data.workouts = data.workouts.filter(w => w.date !== today);
            saveData(data);
            render();
            showToast('Cleared');
        }
        
        // Rendering
        function render() {
            const data = getData();
            const today = getToday();
            const todayWorkouts = data.workouts.filter(w => w.date === today);
            
            // Update stats
            document.getElementById('streakCount').textContent = calculateStreak(data.workouts);
            document.getElementById('weekVolume').textContent = formatVolume(getWeekVolume(data.workouts));
            document.getElementById('totalWorkouts').textContent = data.workouts.length;
            
            // Render today's workouts
            const todayList = document.getElementById('todayList');
            if (todayWorkouts.length === 0) {
                todayList.innerHTML = '<div class="empty-state">Nothing logged yet</div>';
            } else {
                todayList.innerHTML = todayWorkouts.map(w => `
                    <div class="workout-item">
                        <div class="workout-info">
                            <h3>${w.exercise}</h3>
                            <div class="workout-meta">
                                ${w.weight > 0 ? w.weight + 'kg × ' : ''}${w.reps} reps × ${w.sets} sets
                                ${w.isPR ? '<span class="pr-badge">PR</span>' : ''}
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteWorkout(${w.id})">×</button>
                    </div>
                `).join('');
            }
            
            // Render streak bar
            renderStreakBar(data.workouts);
            
            // Render volume chart
            renderVolumeChart(data.workouts);
        }
        
        function calculateStreak(workouts) {
            if (workouts.length === 0) return 0;
            
            const workoutDays = new Set(workouts.map(w => w.date));
            const today = new Date();
            let streak = 0;
            
            for (let i = 0; i < 365; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                
                if (workoutDays.has(dateStr)) {
                    streak++;
                } else if (i > 0) {
                    break;
                }
            }
            
            return streak;
        }
        
        function getWeekVolume(workouts) {
            const weekAgo = getDateDaysAgo(6);
            return workouts
                .filter(w => w.date >= weekAgo)
                .reduce((sum, w) => sum + w.volume, 0);
        }
        
        function formatVolume(vol) {
            if (vol >= 1000) return (vol / 1000).toFixed(1) + 'k';
            return vol.toString();
        }
        
        function renderStreakBar(workouts) {
            const workoutDays = new Set(workouts.map(w => w.date));
            const today = new Date();
            const days = ['S','M','T','W','T','F','S'];
            
            let html = '';
            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const dayName = days[d.getDay()];
                const isActive = workoutDays.has(dateStr);
                const isToday = i === 0;
                
                html += `<div class="streak-day ${isActive ? 'active' : ''} ${isToday ? 'today' : ''}">${dayName}</div>`;
            }
            
            document.getElementById('streakBar').innerHTML = html;
        }
        
        function renderVolumeChart(workouts) {
            const dailyVolume = {};
            for (let i = 6; i >= 0; i--) {
                dailyVolume[getDateDaysAgo(i)] = 0;
            }
            
            workouts.forEach(w => {
                if (dailyVolume.hasOwnProperty(w.date)) {
                    dailyVolume[w.date] += w.volume;
                }
            });
            
            const maxVol = Math.max(...Object.values(dailyVolume), 1);
            const days = Object.keys(dailyVolume).sort();
            
            document.getElementById('volumeChart').innerHTML = days.map(date => {
                const vol = dailyVolume[date];
                const height = (vol / maxVol) * 100;
                const dayName = new Date(date).toLocaleDateString('en-US', { weekday: 'narrow' });
                return `<div class="volume-bar" style="height: ${Math.max(height, 4)}%" data-day="${dayName}" title="${formatVolume(vol)}kg"></div>`;
            }).join('');
        }
        
        // Data management
        function exportData() {
            const data = getData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `workout-log-${getToday()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported');
        }
        
        function showImportModal() {
            document.getElementById('importModal').classList.add('active');
        }
        
        function importData() {
            const text = document.getElementById('importData').value.trim();
            if (!text) {
                showToast('Paste data first');
                return;
            }
            
            try {
                const data = JSON.parse(text);
                if (!data.workouts || !Array.isArray(data.workouts)) {
                    throw new Error('Invalid format');
                }
                saveData(data);
                closeModal();
                document.getElementById('importData').value = '';
                showToast('Imported');
                render();
            } catch (e) {
                showToast('Invalid JSON');
            }
        }
        
        function showHistory() {
            const data = getData();
            const list = document.getElementById('historyList');
            
            if (data.workouts.length === 0) {
                list.innerHTML = '<div class="empty-state">No workouts yet</div>';
            } else {
                const sorted = [...data.workouts].sort((a, b) => b.id - a.id);
                list.innerHTML = sorted.map(w => `
                    <div class="workout-item" style="margin-bottom: 8px;">
                        <div class="workout-info">
                            <h3>${w.exercise}</h3>
                            <div class="workout-meta">${formatDate(w.date)} · ${w.weight}kg × ${w.reps} × ${w.sets}</div>
                        </div>
                    </div>
                `).join('');
            }
            
            document.getElementById('historyModal').classList.add('active');
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'Enter' && document.getElementById('logForm').classList.contains('active')) {
                if (e.ctrlKey || e.metaKey) logWorkout();
            }
        });
        
        // Init
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {
            weekday: 'long',
            month: 'long',
            day: 'numeric'
        });
        
        render();
    </script>
</body>
</html>
